<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>AI Psychological System</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo';
background:linear-gradient(135deg,#0f172a,#4c1d95);
color:white;
}

/* كروت */
.card{
background:rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
margin:15px;
padding:20px;
border-radius:20px;
}

/* أزرار */
button{
padding:12px;
border:none;
border-radius:12px;
background:#6366f1;
color:white;
cursor:pointer;
}

/* شات */
.chat{
height:400px;
overflow:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.msg-user{
background:#6366f1;
padding:12px;
border-radius:15px;
align-self:flex-end;
max-width:70%;
}

.msg-bot{
background:#fff;
color:black;
padding:12px;
border-radius:15px;
align-self:flex-start;
max-width:70%;
}

input{
padding:12px;
border-radius:10px;
border:none;
width:70%;
}

.hidden{display:none;}

</style>
</head>

<body>

<!-- تسجيل -->
<div id="login" class="card">
<h1>🧠 نظام التحليل النفسي الذكي</h1>
<input id="name" placeholder="اسمك">
<input id="age" placeholder="عمرك"><br>
<button onclick="start()">ابدأ التحليل</button>
</div>

<!-- الرئيسية -->
<div id="main" class="hidden">

<h2 id="welcome"></h2>

<div class="card">
<h2>🧠 الاختبار العميق</h2>
<p id="q"></p>
<div id="ans"></div>
<button onclick="next()">التالي</button>
</div>

<div class="card">
<h2>📊 التحليل المتقدم</h2>
<p id="analysis"></p>
</div>

<div class="card">
<h2>📅 الخطة العلاجية التفصيلية</h2>
<p id="plan"></p>
</div>

<div class="card">
<button onclick="openChat()">💬 دخول المستشار الذكي</button>
</div>

</div>

<!-- الشات -->
<div id="chatPage" class="hidden">
<div class="card">
<h2>🤖 المستشار</h2>
<div id="chatBox" class="chat"></div>
<input id="userInput" placeholder="احكي اللي في بالك...">
<button onclick="sendMsg()">إرسال</button><br>
<button onclick="back()">رجوع</button>
</div>
</div>

<script>

let i=0,user="";
let sleep=0, stress=0, mood=0, confidence=0, social=0, study=0;
let memory=[];

// 🧠 أسئلة عميقة
let questions=[

{q:"كم ساعة تنام فعلياً؟",type:"sleep_hours"},
{q:"هل تقوم من النوم وأنت نشيط؟",type:"sleep_quality"},

{q:"كم مرة تحس بتوتر شديد؟",type:"stress_level"},
{q:"هل الأفكار تزعجك قبل النوم؟",type:"stress_thoughts"},

{q:"كيف تصف حالتك النفسية؟",type:"mood_level"},
{q:"هل فقدت شغفك بالأشياء؟",type:"mood_loss"},

{q:"هل تثق بنفسك عند الخطأ؟",type:"confidence"},
{q:"هل تقارن نفسك بالآخرين؟",type:"confidence_compare"},

{q:"هل تشعر أنك وحيد حتى مع الناس؟",type:"social_lonely"},
{q:"هل عندك شخص يفهمك؟",type:"social_support"},

{q:"هل الدراسة تسبب لك ضغط؟",type:"study_stress"},
{q:"هل تشتت بسهولة؟",type:"study_focus"}

];

function start(){
user=name.value;
login.style.display="none";
main.classList.remove("hidden");
welcome.innerHTML="هلا "+user+" 👋";
loadQ();
}

function loadQ(){
let c=questions[i];
q.innerHTML=c.q;

ans.innerHTML=`
<button onclick="answer(2)">نعم</button>
<button onclick="answer(1)">أحياناً</button>
<button onclick="answer(0)">لا</button>
`;
}

function answer(v){
let t=questions[i].type;

if(t.includes("sleep")) sleep+=v;
if(t.includes("stress")) stress+=v;
if(t.includes("mood")) mood+=v;
if(t.includes("confidence")) confidence+=v;
if(t.includes("social")) social+=v;
if(t.includes("study")) study+=v;
}

function next(){
i++;
if(i<12) loadQ(); else finish();
}

function finish(){

let sleepP=(sleep/4)*100;
let stressP=(stress/4)*100;
let moodP=(mood/4)*100;

analysis.innerHTML=`
😴 النوم: ${sleepP.toFixed(0)}%<br>
😰 التوتر: ${stressP.toFixed(0)}%<br>
😊 المزاج: ${moodP.toFixed(0)}%<br><br>

📌 التفسير:<br>
${stressP>70?"ضغط عالي يحتاج تدخل":"وضعك متوسط"}
`;

plan.innerHTML=`
📅 خطة علاجية عميقة:<br><br>

اليوم1:<br>
- نام قبل 12<br>
- اكتب مشاعرك<br>

اليوم2:<br>
- تمارين تنفس 10 دقايق<br>

اليوم3:<br>
- اطلع تمشية<br>

اليوم4:<br>
- كلم شخص تثق فيه<br>

اليوم5:<br>
- خفف استخدام الجوال<br>

اليوم6:<br>
- اشتغل على هدف بسيط<br>

اليوم7:<br>
- قيّم نفسك
`;
}

// 🤖 AI قوي
function sendMsg(){

let input=userInput.value;
if(!input) return;

chatBox.innerHTML+=`<div class="msg-user">${input}</div>`;
memory.push(input);

let reply="";

if(input.includes("توتر")){
reply="واضح إنك مضغوط، خلنا نفكك المشكلة خطوة خطوة.";
}
else if(input.includes("حزين")){
reply="أنا معك… الحزن له سبب، احكي لي.";
}
else{
reply="أنا هنا أسمعك، كمل.";
}

if(memory.join(" ").includes("توتر")){
reply+="<br>واضح التوتر مستمر معك.";
}

reply+="<br><br>📅 نصيحة: خفف الضغط اليوم وخذ راحة.";

chatBox.innerHTML+=`<div class="msg-bot">${reply}</div>`;

userInput.value="";
chatBox.scrollTop=chatBox.scrollHeight;
}

function openChat(){
main.classList.add("hidden");
chatPage.classList.remove("hidden");
}

function back(){
chatPage.classList.add("hidden");
main.classList.remove("hidden");
}

</script>

</body>
</html>
