<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>AI الصحة النفسية</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cairo';
background:linear-gradient(135deg,#4f46e5,#9333ea);
color:white;
}

/* كروت */
.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(15px);
margin:15px;
padding:20px;
border-radius:20px;
}

/* أزرار */
button{
padding:12px;
margin:5px;
border:none;
border-radius:12px;
background:#6366f1;
color:white;
cursor:pointer;
font-size:16px;
}

/* شات */
.chat{
height:300px;
overflow:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.msg-user{
background:#6366f1;
padding:10px;
border-radius:15px;
align-self:flex-end;
max-width:70%;
}

.msg-bot{
background:#fff;
color:black;
padding:10px;
border-radius:15px;
align-self:flex-start;
max-width:70%;
}

input{
width:70%;
padding:10px;
border-radius:10px;
border:none;
}

#bar{
height:10px;
background:lime;
width:0%;
border-radius:10px;
}

</style>
</head>

<body>

<div id="login" class="card">
<h1>🤖 منصة الصحة النفسية</h1>
<input id="name" placeholder="اسمك">
<input id="age" placeholder="عمرك"><br>
<button onclick="start()">ابدأ</button>
</div>

<div id="main" style="display:none">

<h2 id="welcome"></h2>

<div class="card">
<h2>🧠 الاختبار</h2>
<p id="q"></p>
<div id="ans"></div>
<button onclick="next()">التالي</button>
<div style="background:#ddd"><div id="bar"></div></div>
</div>

<div class="card">
<h2>📊 التحليل</h2>
<p id="analysis"></p>
</div>

<div class="card">
<h2>📅 الخطة</h2>
<p id="plan"></p>
</div>

<div class="card">
<h2>💬 المستشار</h2>
<div id="chatBox" class="chat"></div>
<input id="userInput" placeholder="تكلم براحتك...">
<button onclick="sendMsg()">إرسال</button>
</div>

</div>

<script>

let i=0,score=0,user="";
let sleep=0, stress=0, mood=0, confidence=0, social=0, study=0;

// الأسئلة الجديدة المرتبة
let questions = [

{q:"كم ساعة تنام يومياً؟", type:"sleep_hours"},
{q:"هل نومك مريح وتشعر بطاقة بعده؟", type:"sleep_quality"},

{q:"كم مرة تشعر بالتوتر خلال الأسبوع؟", type:"stress_level"},
{q:"هل تجد صعوبة في تهدئة نفسك؟", type:"yesno"},

{q:"كيف تصف مزاجك بشكل عام؟", type:"mood_level"},
{q:"هل تستمتع بالأنشطة اليومية؟", type:"yesno"},

{q:"هل تثق بنفسك؟", type:"yesno"},
{q:"هل تخاف من رأي الآخرين؟", type:"yesno"},

{q:"هل تشعر بالوحدة؟", type:"yesno"},
{q:"هل لديك شخص قريب تتكلم معه؟", type:"yesno"},

{q:"هل الدراسة تضغطك؟", type:"yesno"},
{q:"هل تستطيع التركيز؟", type:"yesno"}

];

function start(){
user=name.value;
login.style.display="none";
main.style.display="block";
welcome.innerHTML="هلا "+user+" 👋";
loadQ();
}

function loadQ(){

let current = questions[i];
q.innerHTML = current.q;

// أنواع الإجابات

if(current.type == "sleep_hours"){
ans.innerHTML = `
<button onclick="answer(0,'sleep')">أقل من 5 ساعات</button>
<button onclick="answer(1,'sleep')">5-6 ساعات</button>
<button onclick="answer(2,'sleep')">7-8 ساعات</button>
`;
}

else if(current.type == "sleep_quality"){
ans.innerHTML = `
<button onclick="answer(2,'sleep')">نعم مريح</button>
<button onclick="answer(1,'sleep')">أحياناً</button>
<button onclick="answer(0,'sleep')">لا</button>
`;
}

else if(current.type == "stress_level"){
ans.innerHTML = `
<button onclick="answer(0,'stress')">نادراً</button>
<button onclick="answer(1,'stress')">أحياناً</button>
<button onclick="answer(2,'stress')">كثير</button>
`;
}

else if(current.type == "mood_level"){
ans.innerHTML = `
<button onclick="answer(0,'mood')">سيء</button>
<button onclick="answer(1,'mood')">متوسط</button>
<button onclick="answer(2,'mood')">جيد</button>
`;
}

else{
ans.innerHTML = `
<button onclick="answer(2,'general')">نعم</button>
<button onclick="answer(1,'general')">أحياناً</button>
<button onclick="answer(0,'general')">لا</button>
`;
}

}

function answer(v,type){

if(type=="sleep") sleep+=v;
if(type=="stress") stress+=v;
if(type=="mood") mood+=v;
if(type=="general"){
confidence+=v;
social+=v;
study+=v;
}

score+=v;
}

function next(){
i++;
bar.style.width=(i/12*100)+"%";
if(i<12) loadQ(); else finish();
}

function finish(){

analysis.innerHTML = "📊 خلصت الاختبار! روح كلم المستشار 👇";

plan.innerHTML = `
📅 خطة مبدئية:<br>
- نم بشكل منتظم 😴<br>
- خفف الضغط 😰<br>
- سو نشاط تحبه 🎯
`;
}

// 🤖 AI يسولف
function sendMsg(){

let input=userInput.value.trim();
if(!input) return;

chatBox.innerHTML+=`<div class="msg-user">${input}</div>`;

let text=input.toLowerCase();
let reply="";

if(text.includes("توتر")){
reply="واضح إنك مضغوط 😔<br>وش أكثر شي مضايقك؟";
}
else if(text.includes("حزين")){
reply="أفهمك 💔<br>تحب تحكي لي السبب؟";
}
else if(text.includes("نوم")){
reply="نومك مهم 😴<br>هل تسهر كثير؟";
}
else{
reply="أنا معك 👌<br>احكي لي أكثر";
}

reply+="<br><br>💡 نصيحتي: خذ وقت لنفسك واهدأ شوي";

chatBox.innerHTML+=`<div class="msg-bot">${reply}</div>`;

userInput.value="";
chatBox.scrollTop=chatBox.scrollHeight;
}

</script>

</body>
</html>
