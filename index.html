<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>منصة الصحة النفسية الذكية</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">

<style>
body{
font-family:'Cairo';
margin:0;
background:linear-gradient(135deg,#0ea5e9,#a78bfa);
color:white;
text-align:center;
}

.card{
background:white;
color:#333;
margin:15px;
padding:20px;
border-radius:20px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
background:#6366f1;
color:white;
cursor:pointer;
}

input{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
}

#bar{height:15px;background:lime;width:0%;}
</style>
</head>

<body>

<div id="login">
<h1>💙 منصة الصحة النفسية</h1>
<input id="name" placeholder="اسمك">
<input id="age" placeholder="عمرك"><br>
<button onclick="start()">ابدأ</button>
</div>

<div id="main" style="display:none">

<h2 id="welcome"></h2>

<div class="card">
<h2>🧠 الاختبار</h2>
<p id="q"></p>
<div id="ans"></div>
<button onclick="next()">التالي</button>
<div style="background:#ddd"><div id="bar"></div></div>
</div>

<div class="card">
<h2>📊 التحليل</h2>
<p id="analysis"></p>
</div>

<div class="card">
<h2>📅 الخطة العلاجية</h2>
<p id="plan"></p>
</div>

<div class="card">
<h2>🤖 المستشار الذكي</h2>
<div id="chatBox" style="height:200px;overflow:auto;background:#eee;color:black;padding:10px;text-align:right"></div>
<input id="userInput" placeholder="اكتب مشكلتك..." style="width:70%">
<button onclick="sendMsg()">إرسال</button>
</div>

</div>

<script>

let i=0,score=0,user="";
let sleep=0, stress=0, mood=0, confidence=0, social=0, study=0;

let memory = JSON.parse(localStorage.getItem("chatMemory") || "[]");

// الأسئلة
let questions = [
{q:"كم ساعة تنام يومياً؟", type:"sleep"},
{q:"هل نومك كافي ويعطيك طاقة؟", type:"sleep"},

{q:"كم مرة تشعر بالتوتر؟", type:"stress"},
{q:"هل تجد صعوبة في تهدئة نفسك؟", type:"stress"},

{q:"كيف تصف مزاجك بشكل عام؟", type:"mood"},
{q:"هل تستمتع بحياتك اليومية؟", type:"mood"},

{q:"هل تثق بنفسك؟", type:"confidence"},
{q:"هل تخاف من رأي الآخرين؟", type:"confidence"},

{q:"هل تشعر بالوحدة؟", type:"social"},
{q:"هل عندك أشخاص قريبين؟", type:"social"},

{q:"هل الدراسة تضغطك؟", type:"study"},
{q:"هل تركز بسهولة؟", type:"study"}
];

function start(){
user=name.value;
login.style.display="none";
main.style.display="block";
welcome.innerHTML="مرحباً "+user;
loadQ();
}

function loadQ(){

let current = questions[i];
q.innerHTML = current.q;

// أنواع الإجابات
if(current.type == "sleep"){

ans.innerHTML = `
<button onclick="answer(0)">أقل من 5 ساعات</button>
<button onclick="answer(1)">5-6 ساعات</button>
<button onclick="answer(2)">7-8 ساعات</button>
`;

}

else if(current.type == "mood"){

ans.innerHTML = `
<button onclick="answer(0)">سيء</button>
<button onclick="answer(1)">متوسط</button>
<button onclick="answer(2)">جيد</button>
`;

}

else{

ans.innerHTML = `
<button onclick="answer(2)">نعم</button>
<button onclick="answer(1)">أحياناً</button>
<button onclick="answer(0)">لا</button>
`;

}

}

function answer(v){
let t=questions[i].type;

if(t=="sleep") sleep+=v;
if(t=="stress") stress+=v;
if(t=="mood") mood+=v;
if(t=="confidence") confidence+=v;
if(t=="social") social+=v;
if(t=="study") study+=v;

score+=v;
}

function next(){
i++;
bar.style.width=(i/12*100)+"%";
if(i<12) loadQ(); else finish();
}

function finish(){
analyze();
generatePlan();
}

function analyze(){

let total = sleep+stress+mood+confidence+social+study;
let percent = Math.round(total/24*100);

let txt="📊 نتيجتك: "+percent+"%<br><br>";

if(sleep < 3) txt+="😴 نومك يحتاج تحسين<br>";
if(stress < 3) txt+="😰 توتر مرتفع<br>";
if(mood < 3) txt+="😊 مزاج منخفض<br>";
if(confidence < 3) txt+="💪 ثقة ضعيفة<br>";
if(social < 3) txt+="🤝 علاقات تحتاج تطوير<br>";

analysis.innerHTML=txt;
}

function generatePlan(){

let plan="📅 خطتك:<br>";

if(stress < 3) plan+="- تمارين تنفس يومية<br>";
if(sleep < 3) plan+="- نوم منتظم<br>";
if(mood < 3) plan+="- سو نشاط تحبه<br>";
if(social < 3) plan+="- تواصل مع شخص قريب<br>";
if(confidence < 3) plan+="- اكتب إنجازاتك<br>";

document.getElementById("plan").innerHTML=plan;
}

// AI
function sendMsg(){

let input = userInput.value.toLowerCase();
if(!input) return;

chatBox.innerHTML += `<p>👤: ${input}</p>`;

let reply="";

if(input.includes("نوم")){
reply="حاول تنظم نومك وتبتعد عن الجوال.";
}
else if(input.includes("توتر")){
reply="جرب تمارين التنفس وهدّئ نفسك.";
}
else if(input.includes("حزين")){
reply="تكلم مع شخص تثق فيه.";
}
else{
reply="أنا معك، احكي أكثر.";
}

chatBox.innerHTML += `<p>🤖: ${reply}</p>`;

userInput.value="";
chatBox.scrollTop = chatBox.scrollHeight;
}

</script>

</body>
</html>
