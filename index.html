<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>منصة الصحة النفسية المتقدمة</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:'Cairo';
background:linear-gradient(135deg,#dbeafe,#fce7f3);
text-align:center;
margin:0;
}

section{
background:white;
margin:20px;
padding:20px;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
}

#bar{height:20px;background:green;width:0%;}
</style>
</head>

<body>

<div id="login">
<h1>💙 منصة الصحة النفسية</h1>
<input id="name" placeholder="اسمك">
<input id="age" placeholder="عمرك"><br>
<button onclick="start()">ابدأ</button>
</div>

<div id="main" style="display:none">

<h2 id="welcome"></h2>

<section>
<h2>🧠 الاستبيان</h2>
<p id="q"></p>
<div id="ans"></div>
<button onclick="next()">التالي</button>
<div style="background:#ddd"><div id="bar"></div></div>
</section>

<section>
<h2>📊 النتيجة والتحليل</h2>
<p id="result"></p>
<canvas id="chart"></canvas>
</section>

<section>
<h2>📋 تقريرك</h2>
<p id="report"></p>
</section>

<section>
<h2>📅 خطة أسبوعية</h2>
<ul id="plan"></ul>
</section>

<section>
<h2>🧘 تمرين تنفس</h2>
<p id="breath">اضغط لبدء</p>
<button onclick="breathing()">ابدأ</button>
</section>

<section>
<h2>💬 مستشار ذكي</h2>
<button onclick="advisor()">نصيحة</button>
<p id="adv"></p>
</section>

<section>
<h2>🎮 موقف تفاعلي</h2>
<p>أنت متوتر قبل اختبار، ماذا تفعل؟</p>
<button onclick="scenario(1)">أذاكر</button>
<button onclick="scenario(2)">أتوتر</button>
<p id="scenarioResult"></p>
</section>

<section>
<h2>😄 حالتك</h2>
<button onclick="mood('😄')">سعيد</button>
<button onclick="mood('😐')">عادي</button>
<button onclick="mood('😔')">حزين</button>
<p id="moods"></p>
</section>

<section>
<h2>📝 ملاحظات</h2>
<textarea id="note"></textarea>
<button onclick="saveNote()">حفظ</button>
<p id="notes"></p>
</section>

<section>
<h2>🏆 إنجازات</h2>
<p id="ach"></p>
</section>

<section>
<h2>💡 هل تعلم؟</h2>
<p id="fact"></p>
</section>

</div>

<script>

let user="",i=0,score=0;
let questions=[
"هل تنام جيداً؟","هل تشعر بالتوتر؟","هل سعيد؟","هل تثق بنفسك؟",
"هل لديك أصدقاء؟","هل تمارس الرياضة؟","هل تستخدم الجوال كثير؟",
"هل تفكر كثيراً؟","هل تحب نفسك؟","هل تشعر بالراحة؟",
"هل لديك هدف؟","هل تنام مبكراً؟","هل تضحك كثيراً؟",
"هل تتواصل مع الآخرين؟","هل تشعر بالضغط؟"
];

function start(){
user=name.value;
login.style.display="none";
main.style.display="block";
welcome.innerHTML="مرحباً "+user;
load();
fact();
loadNotes();
}

function load(){
q.innerHTML=questions[i];
ans.innerHTML=`
<button onclick="answer(2)">نعم</button>
<button onclick="answer(1)">أحياناً</button>
<button onclick="answer(0)">لا</button>
`;
}

function answer(v){
score+=v;
}

function next(){
i++;
bar.style.width=(i/15*100)+"%";
if(i<15) load(); else finish();
}

function finish(){
let percent=Math.round(score/30*100);
result.innerHTML="نتيجتك: "+percent+"%";

let old=localStorage.old||0;
result.innerHTML+="<br>السابق: "+old+"%";
localStorage.old=percent;

draw(percent);

analysis(percent);
plan();
achievement(percent);
}

function draw(p){
new Chart(chart,{
type:'bar',
data:{labels:["نتيجتك"],datasets:[{data:[p]}]}
});
}

function analysis(p){
let text="";
if(p<50) text="⚠️ تحتاج تحسين النوم وتقليل التوتر";
else if(p<75) text="🙂 وضعك جيد";
else text="👏 ممتاز";
report.innerHTML=text;
}

function plan(){
let days=["رياضة","نوم مبكر","تواصل","راحة","قراءة","مشي","تأمل"];
plan.innerHTML="";
days.forEach(d=>plan.innerHTML+=`<li>${d}</li>`);
}

function breathing(){
let count=5;
let interval=setInterval(()=>{
breath.innerHTML="تنفس "+count;
count--;
if(count<0){clearInterval(interval);breath.innerHTML="انتهى";}
},1000);
}

function advisor(){
let tips=["خذ راحة","اشرب ماء","تواصل مع صديق","نم جيداً"];
adv.innerHTML=tips[Math.floor(Math.random()*tips.length)];
}

function scenario(x){
if(x==1) scenarioResult.innerHTML="👏 قرار ممتاز";
else scenarioResult.innerHTML="⚠️ حاول تهدأ";
}

function mood(m){
let arr=JSON.parse(localStorage.m||"[]");
arr.push(m);
localStorage.m=JSON.stringify(arr);
moods.innerHTML=arr.join(" ");
}

function saveNote(){
localStorage.note=note.value;
notes.innerHTML=note.value;
}

function loadNotes(){
notes.innerHTML=localStorage.note||"";
}

function achievement(p){
if(p>80) ach.innerHTML="🏆 ممتاز";
else if(p>50) ach.innerHTML="👍 جيد";
else ach.innerHTML="💪 تحتاج تطوير";
}

function fact(){
let f=["النوم مهم","الرياضة تقلل التوتر","التواصل مهم"];
fact.innerHTML=f[Math.floor(Math.random()*f.length)];
}

</script>

</body>
</html>
