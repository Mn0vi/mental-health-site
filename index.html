<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>منصة الصحة النفسيه</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:'Cairo';
margin:0;
background:linear-gradient(135deg,#0ea5e9,#a78bfa);
color:white;
text-align:center;
transition:0.5s;
}

.container{
padding:20px;
}

.card{
background:white;
color:#333;
margin:15px;
padding:20px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
animation:fade 0.6s;
}

@keyframes fade{
from{opacity:0; transform:translateY(20px);}
to{opacity:1;}
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:10px;
background:#6366f1;
color:white;
cursor:pointer;
}

input,textarea{
padding:10px;
border-radius:10px;
border:1px solid #ccc;
margin:5px;
}

#bar{height:15px;background:lime;width:0%;border-radius:10px;}
</style>
</head>

<body>

<div class="container" id="login">
<h1>💙 منصة الصحة النفسية</h1>
<p id="quote"></p>
<input id="name" placeholder="اسمك">
<input id="age" placeholder="عمرك"><br>
<button onclick="start()">ابدأ رحلتك 🚀</button>
</div>

<div id="main" style="display:none" class="container">

<h2 id="welcome"></h2>
<p id="timer"></p>
<p id="level"></p>

<button onclick="theme()">🎨 تغيير الشكل</button>

<div class="card">
<h2>🧠 الاختبار</h2>
<p id="q"></p>
<div id="ans"></div>
<button onclick="next()">التالي</button>
<div style="background:#ddd"><div id="bar"></div></div>
</div>

<div class="card">
<h2>📊 النتائج</h2>
<p id="result"></p>
<canvas id="chart"></canvas>
<canvas id="radar"></canvas>
</div>

<div class="card">
<h2>📋 التحليل</h2>
<p id="analysis"></p>
</div>

<div class="card">
<h2>📅 خطتك</h2>
<ul id="plan"></ul>
</div>

<div class="card">
<h2>🧘 تنفس</h2>
<p id="breath"></p>
<button onclick="breathing()">ابدأ</button>
</div>

<div class="card">
<h2>💬 مستشارك</h2>
<button onclick="advisor()">نصيحة</button>
<p id="adv"></p>
</div>

<div class="card">
<h2>🎮 موقف</h2>
<p>عندك اختبار مهم، وش تسوي؟</p>
<button onclick="scenario(1)">أذاكر</button>
<button onclick="scenario(2)">أتوتر</button>
<p id="sc"></p>
</div>

<div class="card">
<h2>😄 حالتك</h2>
<button onclick="mood('😄')">سعيد</button>
<button onclick="mood('😐')">عادي</button>
<button onclick="mood('😔')">حزين</button>
<p id="moods"></p>
</div>

<div class="card">
<h2>📝 ملاحظات</h2>
<textarea id="note"></textarea>
<button onclick="saveNote()">حفظ</button>
<p id="notes"></p>
</div>

<div class="card">
<h2>🎯 هدفك</h2>
<input id="goal">
<button onclick="saveGoal()">حفظ</button>
<p id="goalText"></p>
</div>

<div class="card">
<h2>🏆 إنجازات</h2>
<p id="ach"></p>
</div>

<div class="card">
<h2>📜 شهادة</h2>
<p id="cert"></p>
<button onclick="window.print()">طباعة</button>
</div>

</div>

<script>

let user="",i=0,score=0,points=0,startTime;

let questions=[
"هل تنام جيداً؟","هل تتوتر؟","هل سعيد؟","هل تثق بنفسك؟",
"هل لديك أصدقاء؟","هل تمارس الرياضة؟","هل تستخدم الجوال كثير؟",
"هل تفكر كثيراً؟","هل تحب نفسك؟","هل مرتاح؟",
"هل عندك هدف؟","هل تنام بدري؟","هل تضحك؟",
"هل تتواصل؟","هل مضغوط؟","هل تركز؟",
"هل تشعر بالقلق؟","هل تسترخي؟","هل تنظم وقتك؟","هل متفائل؟"
];

function start(){
user=name.value;
login.style.display="none";
main.style.display="block";
welcome.innerHTML="مرحباً "+user;

startTime=Date.now();
setInterval(()=>{
timer.innerHTML="⏱️ "+Math.floor((Date.now()-startTime)/1000)+" ثانية";
},1000);

load();
quote();
}

function load(){
q.innerHTML=questions[i];
ans.innerHTML=`
<button onclick="answer(2)">نعم</button>
<button onclick="answer(1)">أحياناً</button>
<button onclick="answer(0)">لا</button>
`;
}

function answer(v){
score+=v;
points+=10;
level.innerHTML="النقاط: "+points;
}

function next(){
i++;
bar.style.width=(i/20*100)+"%";
if(i<20) load(); else finish();
}

function finish(){
let p=Math.round(score/40*100);
let old=localStorage.old||0;

result.innerHTML="نتيجتك: "+p+"%<br>السابق: "+old+"%";
localStorage.old=p;

analysis.innerHTML= p<50?"⚠️ تحتاج راحة": p<75?"🙂 جيد":"👏 ممتاز";

draw(p);
planGen();
achieve(p);

cert.innerHTML="شهادة: "+user+" - "+p+"%";
}

function draw(p){
new Chart(chart,{type:'doughnut',
data:{labels:["نتيجتك","الباقي"],datasets:[{data:[p,100-p]}]}});

new Chart(radar,{
type:'radar',
data:{labels:["نوم","توتر","سعادة","ثقة","علاقات"],
datasets:[{data:[p/2,p/3,p/2,p/2,p/2]}]}
});
}

function planGen(){
let arr=["رياضة","نوم","راحة","تواصل","مشي","تأمل"];
plan.innerHTML="";
arr.forEach(x=>plan.innerHTML+=`<li>${x}</li>`);
}

function breathing(){
let c=5;
let t=setInterval(()=>{
breath.innerHTML="تنفس "+c;
c--;
if(c<0){clearInterval(t);breath.innerHTML="انتهى";}
},1000);
}

function advisor(){
let tips=["استرخي","اشرب ماء","نم جيداً","تواصل"];
adv.innerHTML=tips[Math.floor(Math.random()*tips.length)];
}

function scenario(x){
sc.innerHTML= x==1?"👏 ممتاز":"⚠️ حاول تهدأ";
}

function mood(m){
let arr=JSON.parse(localStorage.m||"[]");
arr.push(m);
localStorage.m=JSON.stringify(arr);
moods.innerHTML=arr.join(" ");
}

function saveNote(){
localStorage.note=note.value;
notes.innerHTML=note.value;
}

function saveGoal(){
goalText.innerHTML=goal.value;
}

function achieve(p){
ach.innerHTML= p>80?"🏆 بطل":"👍 استمر";
}

function theme(){
document.body.style.background="linear-gradient(135deg,#f472b6,#60a5fa)";
}

function quote(){
let q=["ابدأ يومك بإيجابية","أنت قوي","لا تستسلم"];
document.getElementById("quote").innerHTML=q[Math.floor(Math.random()*q.length)];
}

</script>

</body>
</html>
