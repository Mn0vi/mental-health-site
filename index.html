<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>الصحة النفسية</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

/* عام */
body{
margin:0;
font-family:'Cairo';
background:#0f172a;
color:white;
}

/* شريط علوي */
.navbar{
display:flex;
justify-content:space-between;
padding:15px;
background:#1e293b;
}

.navbar button{
background:none;
border:none;
color:white;
font-size:16px;
cursor:pointer;
}

/* صفحات */
.page{
display:none;
padding:20px;
}

.active{
display:block;
}

/* كروت */
.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:15px;
}

/* أزرار */
button.main{
background:#6366f1;
padding:10px;
border:none;
border-radius:10px;
color:white;
}

/* شات */
.chat{
height:400px;
overflow:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.msg-user{
background:#6366f1;
padding:10px;
border-radius:15px;
align-self:flex-end;
max-width:70%;
}

.msg-bot{
background:white;
color:black;
padding:10px;
border-radius:15px;
align-self:flex-start;
max-width:70%;
}

input{
padding:10px;
width:70%;
border-radius:10px;
border:none;
}

</style>
</head>

<body>

<!-- Navbar -->
<div class="navbar">
<div>🧠 الصحة النفسية</div>
<div>
<button onclick="show('home')">الرئيسية</button>
<button onclick="show('test')">الاختبار</button>
<button onclick="show('analysis')">التحليل</button>
<button onclick="show('plan')">الخطة</button>
<button onclick="show('chat')">AI</button>
</div>
</div>

<!-- الصفحات -->

<div id="home" class="page active">
<div class="card">
<h2>مرحباً 👋</h2>
<p>ابدأ اختبارك النفسي واحصل على تحليل وخطة علاجية مخصصة</p>
</div>
</div>

<div id="test" class="page">
<div class="card">
<h2>🧠 الاختبار</h2>
<p id="q"></p>
<div id="ans"></div>
<button class="main" onclick="next()">التالي</button>
</div>
</div>

<div id="analysis" class="page">
<div class="card">
<h2>📊 التحليل</h2>
<p id="analysisText"></p>
</div>
</div>

<div id="plan" class="page">
<div class="card">
<h2>📅 الخطة</h2>
<p id="planText"></p>
</div>
</div>

<div id="chat" class="page">
<div class="card">
<h2>🤖 المستشار</h2>
<div id="chatBox" class="chat"></div>
<input id="userInput">
<button class="main" onclick="sendMsg()">إرسال</button>
</div>
</div>

<script>

// تنقل
function show(page){
document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
document.getElementById(page).classList.add('active');
}

// بيانات
let i=0;
let sleep=0, stress=0, mood=0;

// أسئلة
let questions=[
"كم ساعة تنام؟",
"هل تشعر بتوتر؟",
"كيف مزاجك؟"
];

function loadQ(){
q.innerHTML=questions[i];
ans.innerHTML=`
<button onclick="answer(2)">جيد</button>
<button onclick="answer(1)">متوسط</button>
<button onclick="answer(0)">سيء</button>
`;
}

loadQ();

function answer(v){
if(i==0) sleep+=v;
if(i==1) stress+=v;
if(i==2) mood+=v;
}

function next(){
i++;
if(i<questions.length){
loadQ();
}else{
finish();
}
}

function finish(){
analysisText.innerHTML=`
نوم: ${sleep*50}%<br>
توتر: ${stress*50}%<br>
مزاج: ${mood*50}%
`;

planText.innerHTML=`
اليوم1: راحة<br>
اليوم2: تمارين<br>
اليوم3: نشاط
`;
}

// AI
function sendMsg(){
let input=userInput.value;
chatBox.innerHTML+=`<div class="msg-user">${input}</div>`;

let reply="أنا معك، احكي أكثر 👍";

chatBox.innerHTML+=`<div class="msg-bot">${reply}</div>`;
userInput.value="";
}

</script>

</body>
</html>
