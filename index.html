<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>منصة الصحة النفسية الذكية</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{
font-family:'Cairo';
margin:0;
background:linear-gradient(135deg,#0ea5e9,#a78bfa);
color:white;
text-align:center;
}

.card{
background:white;
color:#333;
margin:15px;
padding:20px;
border-radius:20px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:10px;
background:#6366f1;
color:white;
cursor:pointer;
}

input{
padding:10px;
margin:5px;
border-radius:10px;
border:none;
}

#bar{height:15px;background:lime;width:0%;}
</style>
</head>

<body>

<!-- تسجيل الدخول -->
<div id="login">
<h1>💙 منصة الصحة النفسية</h1>
<input id="name" placeholder="اسمك">
<input id="age" placeholder="عمرك"><br>
<button onclick="start()">ابدأ</button>
</div>

<!-- الموقع -->
<div id="main" style="display:none">

<h2 id="welcome"></h2>

<!-- اختبار -->
<div class="card">
<h2>🧠 الاختبار</h2>
<p id="q"></p>
<div id="ans"></div>
<button onclick="next()">التالي</button>
<div style="background:#ddd"><div id="bar"></div></div>
</div>

<!-- تحليل -->
<div class="card">
<h2>📊 التحليل</h2>
<p id="analysis"></p>
</div>

<!-- خطة -->
<div class="card">
<h2>📅 الخطة العلاجية</h2>
<p id="plan"></p>
</div>

<!-- شات AI -->
<div class="card">
<h2>🤖 المستشار الذكي</h2>

<div id="chatBox" style="height:200px;overflow:auto;background:#eee;color:black;padding:10px;text-align:right"></div>

<input id="userInput" placeholder="اكتب مشكلتك..." style="width:70%">
<button onclick="sendMsg()">إرسال</button>

</div>

</div>

<script>

// بيانات
let i=0, score=0, user="";
let sleep=0, stress=0, mood=0, confidence=0, social=0, study=0;

// ذاكرة الشات
let memory = JSON.parse(localStorage.getItem("chatMemory") || "[]");

// الأسئلة
let questions = [
{q:"كم ساعة تنام يومياً؟", type:"sleep"},
{q:"هل تعاني من صعوبة في النوم؟", type:"sleep"},
{q:"كم مرة تشعر بالقلق؟", type:"stress"},
{q:"هل تفكر كثيراً؟", type:"stress"},
{q:"هل تشعر بالسعادة؟", type:"mood"},
{q:"هل تستمتع بالأنشطة؟", type:"mood"},
{q:"هل تثق بنفسك؟", type:"confidence"},
{q:"هل تقارن نفسك؟", type:"confidence"},
{q:"هل لديك أصدقاء؟", type:"social"},
{q:"هل تشعر بالوحدة؟", type:"social"},
{q:"هل عندك ضغط دراسي؟", type:"study"},
{q:"هل تنظم وقتك؟", type:"study"}
];

// بدء
function start(){
user=name.value;
login.style.display="none";
main.style.display="block";
welcome.innerHTML="مرحباً "+user;
loadQ();
}

// عرض سؤال
function loadQ(){
q.innerHTML=questions[i].q;
ans.innerHTML=`
<button onclick="answer(2)">نعم</button>
<button onclick="answer(1)">أحياناً</button>
<button onclick="answer(0)">لا</button>
`;
}

// تسجيل إجابة
function answer(v){
let t=questions[i].type;

if(t=="sleep") sleep+=v;
if(t=="stress") stress+=v;
if(t=="mood") mood+=v;
if(t=="confidence") confidence+=v;
if(t=="social") social+=v;
if(t=="study") study+=v;

score+=v;
}

// التالي
function next(){
i++;
bar.style.width=(i/12*100)+"%";
if(i<12) loadQ(); else finish();
}

// النهاية
function finish(){
analyze();
generatePlan();
}

// التحليل
function analyze(){

let total = sleep+stress+mood+confidence+social+study;
let percent = Math.round(total/24*100);

let txt="📊 نتيجتك: "+percent+"%<br><br>";

txt+="😴 النوم: "+sleep*10+"%<br>";
txt+="😰 التوتر: "+stress*10+"%<br>";
txt+="😊 المزاج: "+mood*10+"%<br>";
txt+="💪 الثقة: "+confidence*10+"%<br>";
txt+="🤝 العلاقات: "+social*10+"%<br>";
txt+="📚 الضغط: "+study*10+"%<br><br>";

if(stress<3) txt+="⚠️ توتر مرتفع<br>";
if(sleep<3) txt+="⚠️ نوم ضعيف<br>";
if(mood<3) txt+="⚠️ مزاج منخفض<br>";

analysis.innerHTML=txt;
}

// الخطة
function generatePlan(){

let plan="📅 خطتك:<br>";

if(stress<3) plan+="- تمرين تنفس يومي<br>";
if(sleep<3) plan+="- نم 7-8 ساعات<br>";
if(mood<3) plan+="- مارس نشاط تحبه<br>";
if(social<3) plan+="- تواصل مع صديق<br>";
if(confidence<3) plan+="- اكتب إنجازاتك<br>";

document.getElementById("plan").innerHTML=plan;
}

// 🤖 AI الذكي بذاكرة
function sendMsg(){

let input = userInput.value.toLowerCase();
let chat = chatBox;

if(input=="") return;

// حفظ
memory.push({role:"user", text:input});
localStorage.setItem("chatMemory", JSON.stringify(memory));

// عرض المستخدم
chat.innerHTML += "<p>👤: "+input+"</p>";

// تحليل كلمات
let keywords = {
"متوتر":["قلق","توتر","ضغط"],
"حزين":["حزن","ضايق"],
"نوم":["نوم","تعب"],
"وحدة":["وحيد","وحده"],
"دراسة":["اختبار","مدرسة"]
};

function detect(text){
for(let k in keywords){
for(let w of keywords[k]){
if(text.includes(w)) return k;
}
}
return "عام";
}

let type = detect(input);

// ذاكرة
let lastMsgs = memory.slice(-3).map(m=>m.text).join(" ");
let memoryHint = "";

if(lastMsgs.includes("توتر")||lastMsgs.includes("قلق"))
memoryHint="واضح أنك تعاني من توتر مستمر. ";

// رد
let reply="", deep="";

switch(type){
case "متوتر":
reply="واضح أنك متوتر.";
deep="جرب تهدئة نفسك بالتنفس.";
break;

case "حزين":
reply="أفهم شعورك.";
deep="تكلم مع شخص قريب.";
break;

case "نوم":
reply="نومك يحتاج تحسين.";
deep="نظم وقت نومك.";
break;

default:
reply="أنا معك.";
deep="وضح أكثر.";
}

// ربط بالتحليل
if(stress<3) deep+="<br>📊 عندك توتر مرتفع";
if(sleep<3) deep+="<br>😴 نومك ضعيف";

// خطة
let plan="<br><br>📅 نصيحتي:<br>";
if(stress<3) plan+="- تنفس<br>";
if(sleep<3) plan+="- نام بدري<br>";
if(mood<3) plan+="- سو شي تحبه<br>";

let finalReply = memoryHint + reply + "<br>"+deep+plan;

// حفظ
memory.push({role:"bot", text:finalReply});
localStorage.setItem("chatMemory", JSON.stringify(memory));

// عرض
chat.innerHTML += "<p>🤖: "+finalReply+"</p>";

userInput.value="";
chat.scrollTop = chat.scrollHeight;
}

</script>

</body>
</html>
