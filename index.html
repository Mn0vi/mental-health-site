<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>منصة AI للصحة النفسية</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Cairo';
background:linear-gradient(135deg,#1e1b4b,#7c3aed);
color:white;
}

/* كروت */
.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(20px);
margin:15px;
padding:20px;
border-radius:20px;
}

/* أزرار */
button{
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#6366f1,#9333ea);
color:white;
cursor:pointer;
}

/* شات */
.chat{
height:350px;
overflow:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.msg-user{
background:#6366f1;
padding:10px;
border-radius:15px;
align-self:flex-end;
max-width:70%;
}

.msg-bot{
background:#fff;
color:black;
padding:10px;
border-radius:15px;
align-self:flex-start;
max-width:70%;
}

input{
padding:10px;
border-radius:10px;
border:none;
width:70%;
}

#bar{
height:10px;
background:lime;
width:0%;
}

.hidden{display:none;}

</style>
</head>

<body>

<!-- تسجيل -->
<div id="login" class="card">
<h1>🤖 منصة الصحة النفسية الذكية</h1>
<input id="name" placeholder="اسمك">
<input id="age" placeholder="عمرك"><br>
<button onclick="start()">ابدأ</button>
</div>

<!-- الصفحة الرئيسية -->
<div id="main" class="hidden">

<h2 id="welcome"></h2>

<div class="card">
<h2>🧠 الاختبار</h2>
<p id="q"></p>
<div id="ans"></div>
<button onclick="next()">التالي</button>
<div style="background:#333"><div id="bar"></div></div>
</div>

<div class="card">
<h2>📊 التحليل</h2>
<p id="analysis"></p>
</div>

<div class="card">
<h2>📅 الخطة الأسبوعية</h2>
<p id="plan"></p>
</div>

<div class="card">
<button onclick="openChat()">🤖 تحدث مع المستشار</button>
</div>

</div>

<!-- صفحة الشات -->
<div id="chatPage" class="hidden">
<div class="card">
<h2>💬 المستشار الذكي</h2>
<div id="chatBox" class="chat"></div>
<input id="userInput">
<button onclick="sendMsg()">إرسال</button><br>
<button onclick="back()">رجوع</button>
</div>
</div>

<script>

let i=0,user="";
let sleep=0, stress=0, mood=0, confidence=0, social=0, study=0;

let questions=[
{q:"كم ساعة تنام؟",type:"sleep"},
{q:"هل نومك مريح؟",type:"sleep"},
{q:"هل تشعر بتوتر؟",type:"stress"},
{q:"هل تهدأ بسهولة؟",type:"stress"},
{q:"كيف مزاجك؟",type:"mood"},
{q:"هل تستمتع؟",type:"mood"},
{q:"هل تثق بنفسك؟",type:"confidence"},
{q:"هل تخاف من رأي الناس؟",type:"confidence"},
{q:"هل تشعر بالوحدة؟",type:"social"},
{q:"هل عندك دعم؟",type:"social"},
{q:"هل الدراسة تضغطك؟",type:"study"},
{q:"هل تركز؟",type:"study"}
];

function start(){
user=name.value;
login.style.display="none";
main.classList.remove("hidden");
welcome.innerHTML="هلا "+user;
loadQ();
}

function loadQ(){
let c=questions[i];
q.innerHTML=c.q;

ans.innerHTML=`
<button onclick="answer(2)">جيد</button>
<button onclick="answer(1)">متوسط</button>
<button onclick="answer(0)">سيء</button>
`;
}

function answer(v){
let t=questions[i].type;

if(t=="sleep") sleep+=v;
if(t=="stress") stress+=v;
if(t=="mood") mood+=v;
if(t=="confidence") confidence+=v;
if(t=="social") social+=v;
if(t=="study") study+=v;
}

function next(){
i++;
bar.style.width=(i/12*100)+"%";
if(i<12) loadQ(); else finish();
}

function finish(){

// نسب
let sleepP = sleep/4*100;
let stressP = stress/4*100;
let moodP = mood/4*100;

// تحليل
analysis.innerHTML=`
نوم: ${sleepP.toFixed(0)}%<br>
توتر: ${stressP.toFixed(0)}%<br>
مزاج: ${moodP.toFixed(0)}%
`;

// خطة أسبوع
plan.innerHTML=`
📅 خطة أسبوع:<br><br>
اليوم 1: راحة + نوم بدري<br>
اليوم 2: تمارين تنفس<br>
اليوم 3: نشاط تحبه<br>
اليوم 4: تواصل اجتماعي<br>
اليوم 5: تقليل ضغط<br>
اليوم 6: تطوير نفسك<br>
اليوم 7: مراجعة حالتك
`;
}

// فتح الشات
function openChat(){
main.classList.add("hidden");
chatPage.classList.remove("hidden");
}

function back(){
chatPage.classList.add("hidden");
main.classList.remove("hidden");
}

// AI
function sendMsg(){

let input=userInput.value;
if(!input) return;

chatBox.innerHTML+=`<div class="msg-user">${input}</div>`;

let reply="";

if(input.includes("توتر")){
reply="واضح إنك مضغوط، خلنا نحدد السبب ونحله خطوة خطوة.";
}
else if(input.includes("حزين")){
reply="أنا معك، الحزن هذا له سبب؟ احكي لي.";
}
else{
reply="أنا هنا معك، كمل كلامك.";
}

reply+=`<br><br>📅 نصيحتي: خذ وقت لنفسك اليوم`;

chatBox.innerHTML+=`<div class="msg-bot">${reply}</div>`;

userInput.value="";
chatBox.scrollTop=chatBox.scrollHeight;
}

</script>

</body>
</html>
