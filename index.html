<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>AI Mental Health Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Cairo';
background:linear-gradient(135deg,#1e1b4b,#312e81,#7c3aed);
color:white;
overflow-x:hidden;
}

/* Glass */
.card{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(20px);
margin:15px;
padding:20px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
}

/* زر */
button{
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(45deg,#6366f1,#9333ea);
color:white;
cursor:pointer;
font-size:16px;
transition:0.3s;
}
button:hover{transform:scale(1.05);}

/* شات */
.chat{
height:350px;
overflow:auto;
display:flex;
flex-direction:column;
gap:10px;
}

.msg-user{
background:#6366f1;
padding:12px;
border-radius:15px;
align-self:flex-end;
max-width:75%;
animation:fade 0.3s;
}

.msg-bot{
background:white;
color:black;
padding:12px;
border-radius:15px;
align-self:flex-start;
max-width:75%;
animation:fade 0.3s;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px);}
to{opacity:1;}
}

input{
width:70%;
padding:12px;
border-radius:10px;
border:none;
}

#bar{
height:10px;
background:lime;
width:0%;
border-radius:10px;
}

</style>
</head>

<body>

<div id="login" class="card">
<h1>🤖 AI الصحة النفسية</h1>
<input id="name" placeholder="اسمك">
<input id="age" placeholder="عمرك"><br>
<button onclick="start()">ابدأ</button>
</div>

<div id="main" style="display:none">

<h2 id="welcome"></h2>

<div class="card">
<h2>🧠 الاختبار</h2>
<p id="q"></p>
<div id="ans"></div>
<button onclick="next()">التالي</button>
<div style="background:#333"><div id="bar"></div></div>
</div>

<div class="card">
<h2>📊 التحليل</h2>
<p id="analysis"></p>
</div>

<div class="card">
<h2>📅 خطتك</h2>
<p id="plan"></p>
</div>

<div class="card">
<h2>💬 المستشار الذكي</h2>
<div id="chatBox" class="chat"></div>
<input id="userInput" placeholder="تكلم براحتك...">
<button onclick="sendMsg()">إرسال</button>
</div>

</div>

<script>

let i=0,score=0,user="";
let sleep=0, stress=0, mood=0, confidence=0, social=0, study=0;

let memory=[];

let questions=[
{q:"كم ساعة تنام؟",type:"sleep"},
{q:"هل نومك مريح؟",type:"sleep"},
{q:"هل تشعر بتوتر؟",type:"stress"},
{q:"هل تهدأ بسهولة؟",type:"stress"},
{q:"كيف مزاجك؟",type:"mood"},
{q:"هل تستمتع بيومك؟",type:"mood"},
{q:"هل تثق بنفسك؟",type:"confidence"},
{q:"هل تهتم برأي الناس؟",type:"confidence"},
{q:"هل تشعر بالوحدة؟",type:"social"},
{q:"هل عندك أصدقاء؟",type:"social"},
{q:"هل الدراسة تضغطك؟",type:"study"},
{q:"هل تركز؟",type:"study"}
];

function start(){
user=name.value;
login.style.display="none";
main.style.display="block";
welcome.innerHTML="هلا "+user+" 👋";
loadQ();
}

function loadQ(){
let current=questions[i];
q.innerHTML=current.q;

ans.innerHTML=`
<button onclick="answer(2)">نعم</button>
<button onclick="answer(1)">أحياناً</button>
<button onclick="answer(0)">لا</button>
`;
}

function answer(v){
let t=questions[i].type;

if(t=="sleep") sleep+=v;
if(t=="stress") stress+=v;
if(t=="mood") mood+=v;
if(t=="confidence") confidence+=v;
if(t=="social") social+=v;
if(t=="study") study+=v;

score+=v;
}

function next(){
i++;
bar.style.width=(i/12*100)+"%";
if(i<12) loadQ(); else finish();
}

function finish(){
analysis.innerHTML="📊 تم التحليل! تكلم مع AI 👇";
plan.innerHTML="📅 بيتم إعطاؤك خطة داخل المحادثة";
}

// 🤖 AI خرافي
function sendMsg(){

let input=userInput.value.trim();
if(!input) return;

chatBox.innerHTML+=`<div class="msg-user">${input}</div>`;

let text=input.toLowerCase();
let reply="";

// تحليل أعمق
if(text.includes("توتر")||text.includes("ضغط")){
reply="واضح إنك مضغوط 😔<br>خلنا نحدد السبب سوا… وش اللي مضايقك أكثر؟";
}
else if(text.includes("حزين")){
reply="الحزن واضح من كلامك 💔<br>أنا معك، احكي لي وش اللي صاير؟";
}
else if(text.includes("وحده")){
reply="الوحدة شعور صعب 🤍<br>تحس إن مافيه أحد فاهمك؟";
}
else{
reply="أنا هنا معك 👌<br>خذ راحتك بالكلام، وش حاب تقول؟";
}

// نصيحة ذكية
reply+=`<br><br>💡 جرب اليوم:<br>- خذ وقت لنفسك<br>- تنفس بعمق<br>- لا تضغط نفسك`;

chatBox.innerHTML+=`<div class="msg-bot">${reply}</div>`;

userInput.value="";
chatBox.scrollTop=chatBox.scrollHeight;
}

</script>

</body>
</html>
